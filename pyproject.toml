[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long (handled by formatter)
    "F401",   # unused import (some re-exports are intentional)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"conftest.py" = ["F401", "E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
