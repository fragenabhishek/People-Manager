name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        env:
          FLASK_DEBUG: "True"
          SECRET_KEY: "test-secret-key-ci-only"
        run: pytest --tb=short --cov=. --cov-report=xml --cov-report=term-missing -q
      - name: Upload coverage
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t people-manager:ci .
      - name: Smoke test container
        run: |
          docker run -d --name pm-test \
            -e SECRET_KEY=ci-test-key \
            -e FLASK_DEBUG=True \
            -p 5000:5000 \
            people-manager:ci
          sleep 5
          curl -f http://localhost:5000/health || (docker logs pm-test && exit 1)
          docker stop pm-test
