version: "3.8"

# Legacy MongoDB setup.
# Usage: docker compose -f docker-compose.mongo.yml up
services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - MONGO_URI=mongodb://mongo:27017/people_manager
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo_data:
